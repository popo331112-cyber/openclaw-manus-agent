<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manus-like OpenClaw Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f9fafb; }
        .chat-container { max-height: calc(100vh - 180px); overflow-y: auto; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; margin-bottom: 12px; line-height: 1.5; }
        .message.user { background-color: #f3f4f6; color: #111827; align-self: flex-end; border-bottom-right-radius: 4px; margin-left: auto; }
        .message.agent { background-color: #ffffff; color: #1f2937; border: 1px solid #e5e7eb; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .message.system { font-size: 0.85rem; color: #6b7280; text-align: center; margin: 8px auto; max-width: 100%; background: none; border: none; box-shadow: none; }
        .tool-call { font-size: 0.85rem; font-family: monospace; background: #f3f4f6; padding: 4px 8px; border-radius: 4px; margin-top: 8px; color: #4b5563; border: 1px solid #e5e7eb; }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite;}
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);} 40% { color: #6b7280; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);} 60% { text-shadow: .25em 0 0 #6b7280, .5em 0 0 rgba(0,0,0,0);} 80%, 100% { text-shadow: .25em 0 0 #6b7280, .5em 0 0 #6b7280;}}
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-3xl bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden flex flex-col h-[90vh]">
        
        <!-- Header -->
        <div class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold text-sm">A</div>
                <div>
                    <h1 class="font-semibold text-gray-800">Agentic Workspace</h1>
                    <p class="text-xs text-green-600 font-medium flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-green-500 block"></span> Connected to OpenClaw Backend
                    </p>
                </div>
            </div>
            <button id="clearChat" class="text-xs text-gray-500 hover:text-gray-700 font-medium">Clear Chat</button>
        </div>

        <!-- Chat Area -->
        <div id="chatBox" class="flex-1 chat-container p-6 flex flex-col">
            <div class="message system">Agent is ready. What do you want me to do?</div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-white border-t border-gray-200">
            <form id="chatForm" class="relative">
                <textarea 
                    id="userInput" 
                    rows="2" 
                    class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-3 pr-12 resize-none" 
                    placeholder="Ask the agent to perform a task..."
                    required
                ></textarea>
                <button type="submit" id="sendBtn" class="absolute right-2 bottom-2 p-2 text-white bg-indigo-600 hover:bg-indigo-700 focus:ring-4 focus:outline-none focus:ring-indigo-300 font-medium rounded-lg text-sm">
                    <svg class="w-4 h-4 rotate-90" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 18 20">
                        <path d="m17.914 18.594-8-18a1 1 0 0 0-1.828 0l-8 18a1 1 0 0 0 1.157 1.376L8 18.281V9a1 1 0 0 1 2 0v9.281l6.758 1.689a1 1 0 0 0 1.156-1.376Z"/>
                    </svg>
                </button>
            </form>
            <div class="text-center mt-2">
                <span class="text-[10px] text-gray-400">Powered by OpenClaw Agent Runtime</span>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Handle Enter key for textarea
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // Add User message
            appendMessage(text, 'user');
            userInput.value = '';
            
            // Disable input while processing
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Add loading indicator
            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = 'message agent';
            loadingDiv.innerHTML = '<span class="text-gray-500 font-medium">Thinking<span class="loading-dots"></span></span>';
            chatBox.appendChild(loadingDiv);
            scrollToBottom();

            try {
                // Call our Express proxy endpoint
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                
                // Remove loading
                document.getElementById(loadingId).remove();

                if (response.ok) {
                    appendMessage(data.reply, 'agent', data.toolsUsed);
                } else {
                    appendMessage('Error: ' + (data.error || 'Failed to get response'), 'system');
                }
            } catch (error) {
                document.getElementById(loadingId).remove();
                appendMessage('Connection error: Make sure the server is running.', 'system');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                scrollToBottom();
            }
        });

        document.getElementById('clearChat').addEventListener('click', () => {
            chatBox.innerHTML = '<div class="message system">Chat cleared. Ready for new tasks.</div>';
        });

        function appendMessage(text, sender, toolsUsed = []) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            
            // Handle newlines in text
            let contentHtml = text.replace(/\n/g, '<br>');
            
            if (sender === 'agent' && toolsUsed && toolsUsed.length > 0) {
                let toolsHtml = '<div class="mt-3 pt-2 border-t border-gray-100">';
                toolsHtml += '<div class="text-xs font-semibold text-gray-500 mb-1">Tools Executed:</div>';
                toolsUsed.forEach(tool => {
                    toolsHtml += `<div class="tool-call">⚙️ ${tool}</div>`;
                });
                toolsHtml += '</div>';
                contentHtml += toolsHtml;
            }
            
            div.innerHTML = contentHtml;
            chatBox.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
