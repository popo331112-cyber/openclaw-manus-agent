services:
  - type: web
    name: openclaw-agent
    env: node
    buildCommand: apt-get update && apt-get install -y python3 python3-pip && pip3 install yt-dlp && pnpm install
    startCommand: pnpm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
